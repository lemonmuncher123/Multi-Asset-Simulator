[pytest]
markers =
    stress_phase0: Stress test phase 0 — sanity / harness validation.
    stress_phase1: Stress test phase 1 — base dataset structure & integrity.
    stress_phase2: Stress test phase 2 — base dataset read-side engines.
    stress_phase3: Stress test phase 3 — base dataset reports + per-report export.
    stress_phase4: Stress test phase 4 — base dataset full-data export/import roundtrip.
    stress_gui: Stress test offscreen GUI navigation against the BASE dataset.
    stress_extreme: Stress test variants run against the extreme-scale dataset.
